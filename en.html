<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<title>HF Foods Atlanta</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif;background:#f0fdf4;color:#222;font-size:13px}
body{padding-bottom:70px}
.hdr{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #e5e7eb;padding:8px 12px;display:flex;align-items:center;gap:8px}
.hdr img{height:32px}
.hdr h1{font-size:15px;font-weight:700;color:#16a34a;flex:1;line-height:1.2}
.hdr h1 small{display:block;font-size:10px;color:#666;font-weight:400;margin-top:1px}
.lang-link{display:inline-flex;align-items:center;gap:3px;padding:5px 10px;border:1px solid #16a34a;border-radius:6px;background:#fff;color:#16a34a;font-size:11px;font-weight:600;text-decoration:none;flex-shrink:0;cursor:pointer}
.lang-link:active{background:#16a34a;color:#fff}
.srch{padding:8px 12px;background:#fff;border-bottom:1px solid #e5e7eb}
.srch input{width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;outline:none;background:#f0fdf4}
.srch input:focus{border-color:#16a34a;background:#fff}
.tabs{display:flex;gap:4px;padding:8px 12px;background:#fff;border-bottom:1px solid #e5e7eb;overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:5px 10px;border:1px solid #d1d5db;border-radius:14px;background:#fff;font-size:12px;color:#444;cursor:pointer;flex-shrink:0;user-select:none}
.tab.on{background:#16a34a;color:#fff;border-color:#16a34a}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:8px}
@media(min-width:480px){.pgrid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:640px){.pgrid{grid-template-columns:repeat(6,1fr)}}
@media(min-width:900px){.pgrid{grid-template-columns:repeat(8,1fr)}}
@media(min-width:1200px){.pgrid{grid-template-columns:repeat(9,1fr)}}
.pc{background:#fff;border:1px solid #e5e7eb;border-radius:6px;padding:6px;display:flex;flex-direction:column;gap:3px;position:relative;min-height:80px}
.pc.oos{background:#f3f4f6;opacity:.68}
.pc-code{font-size:9px;color:#16a34a;font-weight:700;font-family:"SF Mono",Menlo,Consolas,monospace;letter-spacing:.3px;line-height:1}
.pc-name{font-size:11px;line-height:1.3;color:#222;font-weight:500;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;min-height:28px;word-break:break-word}
.pc-unit{font-size:9px;color:#777}
.pc-stock{font-size:9px;color:#16a34a;font-weight:600}
.pc-stock.low{color:#d97706}
.pc-stock.oos{color:#dc2626}
.pc-oos-badge{position:absolute;top:3px;right:3px;background:#dc2626;color:#fff;font-size:8px;padding:1px 4px;border-radius:3px;font-weight:700;letter-spacing:.3px}
.qty-row{display:flex;align-items:center;justify-content:space-between;gap:2px;margin-top:auto}
.qty-btn{width:22px;height:22px;border:1px solid #16a34a;background:#fff;color:#16a34a;border-radius:4px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
.qty-btn:active{background:#16a34a;color:#fff}
.qty-btn.disabled{border-color:#ccc;color:#ccc;background:#f3f4f6;cursor:not-allowed}
.qty-val{flex:1;text-align:center;font-size:13px;font-weight:700;color:#16a34a}
.qty-val.zero{color:#999;font-weight:400}
.cartbar{position:fixed;bottom:0;left:0;right:0;background:#16a34a;color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 -2px 8px rgba(0,0,0,.15);z-index:99;cursor:pointer}
.cart-info{display:flex;align-items:center;gap:8px}
.cart-icon{font-size:18px}
.cart-txt{font-size:13px;font-weight:600}
.cart-co{background:#fff;color:#16a34a;padding:6px 14px;border-radius:6px;font-size:13px;font-weight:700;border:none;cursor:pointer}
.cart-co:disabled{opacity:.5}
/* Modal */
.mskin{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.mskin.show{display:flex}
.mbox{background:#fff;width:100%;max-width:600px;max-height:88vh;border-radius:12px 12px 0 0;display:flex;flex-direction:column;overflow:hidden;animation:slideup .22s}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhdr{padding:12px 16px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;background:#fff}
.mhdr h3{font-size:15px;font-weight:700}
.mclose{font-size:22px;color:#666;cursor:pointer;background:none;border:none;padding:0;line-height:1}
.mbody{padding:12px 16px;overflow-y:auto;flex:1}
.mfoot{padding:10px 16px;border-top:1px solid #e5e7eb;background:#fff}
/* Cart list */
.ci-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:12px}
.ci-row:last-child{border-bottom:none}
.ci-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ci-unit{color:#777;font-size:10px}
.ci-qty{display:flex;align-items:center;gap:3px}
.ci-del{background:none;border:none;color:#dc2626;font-size:14px;cursor:pointer;padding:2px 4px}
/* Form */
.form-row{margin-bottom:10px}
.form-row label{display:block;font-size:11px;color:#555;margin-bottom:3px;font-weight:600}
.form-row label .req{color:#dc2626}
.form-row input,.form-row textarea{width:100%;padding:7px 9px;border:1px solid #d1d5db;border-radius:5px;font-size:13px;outline:none;background:#fff;font-family:inherit}
.form-row input:focus,.form-row textarea:focus{border-color:#16a34a}
.form-row textarea{resize:vertical;min-height:50px}
.method-opts{display:flex;gap:8px;margin-top:2px}
.m-opt{flex:1;display:flex;align-items:center;gap:6px;padding:9px 10px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#444;user-select:none}
.m-opt input[type=radio]{accent-color:#16a34a;cursor:pointer;flex-shrink:0;margin:0;width:16px;height:16px}
.m-opt.active{border-color:#16a34a;background:#f0fdf4;color:#16a34a;font-weight:600}
.m-hint{margin-top:6px;padding:6px 9px;border-radius:5px;font-size:11px;line-height:1.4;display:none}
.m-hint.show{display:block}
.m-hint.pickup{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534}
.m-hint.delivery{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.lookup-box{display:flex;gap:6px}
.lookup-box input{flex:1}
.lookup-box button{padding:7px 12px;background:#16a34a;color:#fff;border:none;border-radius:5px;font-size:12px;cursor:pointer;white-space:nowrap}
.cust-card{margin-top:6px;padding:6px 8px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:5px;font-size:11px;color:#075985;display:none}
.cust-card.show{display:block}
.btn-send{width:100%;padding:12px;background:#16a34a;color:#fff;border:none;border-radius:6px;font-size:15px;font-weight:700;cursor:pointer}
.btn-send:disabled{opacity:.55}
.msg{padding:8px;border-radius:5px;font-size:12px;margin-bottom:8px;display:none}
.msg.show{display:block}
.msg.err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.msg.ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
.empty{text-align:center;color:#888;padding:30px;font-size:12px}
</style>
</head>

</div>

<div class="srch">

<div class="tabs" id="tabs"></div>

<div id="list"></div>

<div class="cartbar" id="cartbar" onclick="openCart()">

  </div>
  <button class="cart-co" onclick="event.stopPropagation();checkout()" id="coBtn">发送 / Send</button>
</div>

<!-- Cart Modal -->
<div class="mskin" id="mCart">
  <div class="mbox">
    <div class="mhdr">
      <h3 id="mCartTitle">购物车 / Cart</h3>
      <button class="mclose" onclick="closeModal('mCart')">&times;</button>
    </div>
    <div class="mbody" id="mCartBody"></div>
    <div class="mfoot">
      <button class="btn-send" onclick="checkout()" id="mCartCheckout">去结账 / Checkout</button>
    </div>
  </div>
</div>

<!-- Checkout Modal -->
<div class="mskin" id="mCo">
  <div class="mbox">
    <div class="mhdr">
      <h3 id="mCoTitle">结账 / Checkout</h3>
      <button class="mclose" onclick="closeModal('mCo')">&times;</button>
    </div>
    <div class="mbody">
      <div class="msg err" id="msgErr"></div>
      <div class="msg ok" id="msgOk"></div>

      <div class="form-row">
        <label id="labMethod">取货方式 <span class="req">*</span> / Order Type <span class="req">*</span></label>
        <div class="method-opts">
          <label class="m-opt" id="optPickupBox"><input type="radio" name="fmethod" value="pickup" onchange="onMethodChange()"> <span id="optPickup">自取 / Pickup</span></label>
          <label class="m-opt" id="optDeliveryBox"><input type="radio" name="fmethod" value="delivery" onchange="onMethodChange()"> <span id="optDelivery">送货 / Delivery</span></label>
        </div>
        <div class="m-hint" id="methodHint"></div>
      </div>

      <div class="form-row">
        <label id="labId">客户编号（可选） / Customer ID (optional)</label>
        <input type="text" id="fid" placeholder="输入编号 / Enter ID">
      </div>

      <div class="form-row">
        <label id="labName">餐馆名称 <span class="req">*</span> / Restaurant Name <span class="req">*</span></label>
        <input type="text" id="fname" required>
      </div>
      <div class="form-row">
        <label id="labPhone">联系电话 <span class="req">*</span> / Phone <span class="req">*</span></label>
        <input type="tel" id="fphone" inputmode="numeric" maxlength="14" placeholder="10 位数字 / 10 digits" required>
      </div>
      <div class="form-row">
        <label id="labContact">联系人 <span class="req">*</span> / Contact Person <span class="req">*</span></label>
        <input type="text" id="fcontact" required>
      </div>
      <div class="form-row">
        <label id="labEmail">邮箱 <span class="req">*</span> / Email <span class="req">*</span></label>
        <input type="email" id="femail" inputmode="email" placeholder="name@example.com" required>
      </div>
      <div class="form-row">
        <label id="labNote">备注 / Note</label>
        <textarea id="fnote" rows="2" placeholder="其他备注（可选）/ Other notes (optional)"></textarea>
      </div>
    </div>
    <div class="mfoot">
      <button class="btn-send" onclick="sendOrder()" id="btnSend">提交订单 / Submit Order</button>
    </div>
  </div>
</div>

    var c = CATS[i];
    var label = (LANG === 'zh') ? c.cn : c.en;
    html += '<button class="tab' + (AC === c.cn ? ' on' : '') + '" data-cat="' + escAttr(c.cn) + '">' + escHtml(label) + '</button>';
  }
  tabs.innerHTML = html;
  var btns = tabs.querySelectorAll('.tab');
  for (var j = 0; j < btns.length; j++) {
    btns[j].onclick = function() {
      AC = this.getAttribute('data-cat');
      buildTabs();
      renderList();
    };
  }
}

function renderList() {
  var list = document.getElementById('list');
  var sq = SQ.trim().toLowerCase();
  var groups = {};
  var groupOrder = [];
  for (var i = 0; i < PRODS.length; i++) {
    var p = PRODS[i];
    if (AC !== '__ALL__' && p.cat_cn !== AC) continue;
    if (sq) {
      var hay = (p.code + ' ' + p.name_en + ' ' + p.name_cn).toLowerCase();
      if (hay.indexOf(sq) < 0) continue;
    }
    var gk = p.cat_cn;
    if (!groups[gk]) { groups[gk] = []; groupOrder.push(gk); }
    groups[gk].push(p);
  }
  var total = 0;
  for (var k in groups) total += groups[k].length;
  if (total === 0) {
    list.innerHTML = '<div class="empty">' + (LANG === 'zh' ? '没有匹配的产品' : 'No matching products') + '</div>';
    return;
  }
  var out = '';
  for (var gi = 0; gi < groupOrder.length; gi++) {
    var g = groupOrder[gi];
    var label = g;
    for (var ci = 0; ci < CATS.length; ci++) {
      if (CATS[ci].cn === g) { label = (LANG === 'zh') ? CATS[ci].cn : CATS[ci].en; break; }
    }
    out += '<div style="padding:8px 12px 4px;font-size:12px;font-weight:700;color:#166534;background:#f0fdf4">' + escHtml(label) + ' (' + groups[g].length + ')</div>';
    out += '<div class="pgrid">';
    for (var pi = 0; pi < groups[g].length; pi++) {
      out += makeCard(groups[g][pi]);
    }
    out += '</div>';
  }
  list.innerHTML = out;
  bindCardBtns();
}

function makeCard(p) {
  var name = (LANG === 'zh') ? (p.name_cn || p.name_en) : (p.name_en || p.name_cn);
  var isOos = (p.stock <= 0);
  var isLow = (p.stock > 0 && p.stock < 10);
  var qty = (cart[p.code] && cart[p.code].qty) || 0;
  var stockTxt = '';
  var stockCls = 'pc-stock';
  if (isOos) {
    stockTxt = t('oos');
    stockCls = 'pc-stock oos';
  } else if (isLow) {
    stockTxt = t('low');
    stockCls = 'pc-stock low';
  } else {
    stockTxt = t('in_stock');
  }
  var h = '<div class="pc' + (isOos ? ' oos' : '') + '" data-code="' + escAttr(p.code) + '">';
  if (isOos) {
    h += '<span class="pc-oos-badge">' + t('oos') + '</span>';
  }
  h += '<div class="pc-code">[' + escHtml(p.code) + ']</div>';
  h += '<div class="pc-name">' + escHtml(name) + '</div>';
  h += '<div class="pc-unit">' + escHtml(p.unit || '') + '</div>';
  h += '<div class="' + stockCls + '">' + escHtml(stockTxt) + '</div>';
  h += '<div class="qty-row">';
  if (isOos) {
    h += '<button class="qty-btn disabled" disabled>-</button>';
    h += '<span class="qty-val zero">0</span>';
    h += '<button class="qty-btn disabled" disabled>+</button>';
  } else {
    h += '<button class="qty-btn qb-minus" data-code="' + escAttr(p.code) + '">-</button>';
    h += '<span class="qty-val' + (qty === 0 ? ' zero' : '') + '">' + qty + '</span>';
    h += '<button class="qty-btn qb-plus" data-code="' + escAttr(p.code) + '">+</button>';
  }
  h += '</div></div>';
  return h;
}

function bindCardBtns() {
  var plusBtns = document.querySelectorAll('.qb-plus');
  for (var i = 0; i < plusBtns.length; i++) {
    plusBtns[i].onclick = function(e) {
      e.stopPropagation();
      chq(this.getAttribute('data-code'), 1);
    };
  }
  var minusBtns = document.querySelectorAll('.qb-minus');
  for (var j = 0; j < minusBtns.length; j++) {
    minusBtns[j].onclick = function(e) {
      e.stopPropagation();
      chq(this.getAttribute('data-code'), -1);
    };
  }
}

function chq(code, delta) {
  var p = PRODS_BY_CODE[code];
  if (!p || p.stock <= 0) return;
  var cur = (cart[code] && cart[code].qty) || 0;
  var next = cur + delta;
  if (next < 0) next = 0;
  if (next > p.stock) next = p.stock;
  if (next === 0) {
    delete cart[code];
  } else {
    cart[code] = { product: p, qty: next };
  }
  // Update only the affected card if possible
  var card = document.querySelector('.pc[data-code="' + code + '"]');
  if (card) {
    var valEl = card.querySelector('.qty-val');
    if (valEl) {
      valEl.textContent = next;
      if (next === 0) valEl.classList.add('zero'); else valEl.classList.remove('zero');
    }
  }
  updateCartBar();
}

function updateCartBar() {
  var count = 0;
  for (var k in cart) count += cart[k].qty;
  var txt = t('cart_n').replace('%n', count);
  document.getElementById('cartTxt').textContent = txt;
  var dis = (count === 0);
  document.getElementById('coBtn').disabled = dis;
}

function openCart() {
  renderCartModal();
  document.getElementById('mCart').classList.add('show');
}

function renderCartModal() {
  var body = document.getElementById('mCartBody');
  var codes = [];
  for (var k in cart) codes.push(k);
  if (codes.length === 0) {
    body.innerHTML = '<div class="empty">' + t('cart_empty') + '</div>';
    document.getElementById('mCartCheckout').disabled = true;
    return;
  }
  document.getElementById('mCartCheckout').disabled = false;
  var out = '';
  for (var i = 0; i < codes.length; i++) {
    var it = cart[codes[i]];
    var p = it.product;
    var name = (LANG === 'zh') ? (p.name_cn || p.name_en) : (p.name_en || p.name_cn);
    out += '<div class="ci-row">';
    out += '<div class="ci-name">' + escHtml(name) + ' <span class="ci-unit">(' + escHtml(p.unit || '') + ')</span></div>';
    out += '<div class="ci-qty">';
    out += '<button class="qty-btn cm-minus" data-code="' + escAttr(p.code) + '">-</button>';
    out += '<span class="qty-val" style="min-width:24px">' + it.qty + '</span>';
    out += '<button class="qty-btn cm-plus" data-code="' + escAttr(p.code) + '">+</button>';
    out += '<button class="ci-del cm-del" data-code="' + escAttr(p.code) + '">🗑</button>';
    out += '</div></div>';
  }
  body.innerHTML = out;
  var mp = body.querySelectorAll('.cm-plus');
  for (var a = 0; a < mp.length; a++) mp[a].onclick = function() { chq(this.getAttribute('data-code'), 1); renderCartModal(); };
  var mm = body.querySelectorAll('.cm-minus');
  for (var b = 0; b < mm.length; b++) mm[b].onclick = function() { chq(this.getAttribute('data-code'), -1); renderCartModal(); };
  var md = body.querySelectorAll('.cm-del');
  for (var c = 0; c < md.length; c++) md[c].onclick = function() { delete cart[this.getAttribute('data-code')]; renderCartModal(); updateCartBar(); renderList(); };
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

function checkout() {
  var count = 0;
  for (var k in cart) count += cart[k].qty;
  if (count === 0) return;
  closeModal('mCart');
  document.getElementById('mCo').classList.add('show');
  document.getElementById('msgErr').classList.remove('show');
  document.getElementById('msgOk').classList.remove('show');
}

function onMethodChange() {
  var radios = document.getElementsByName('fmethod');
  var v = '';
  for (var i = 0; i < radios.length; i++) { if (radios[i].checked) { v = radios[i].value; break; } }
  var hint = document.getElementById('methodHint');
  var labId = document.getElementById('labId');
  var pBox = document.getElementById('optPickupBox');
  var dBox = document.getElementById('optDeliveryBox');
  pBox.classList.toggle('active', v === 'pickup');
  dBox.classList.toggle('active', v === 'delivery');
  hint.classList.remove('show', 'pickup', 'delivery');
  if (v === 'pickup') {
    hint.textContent = t('pickup_hint');
    hint.classList.add('show', 'pickup');
    labId.innerHTML = t('lab_id');
  } else if (v === 'delivery') {
    hint.textContent = t('delivery_hint');
    hint.classList.add('show', 'delivery');
    labId.innerHTML = t('lab_id_required') + ' <span class="req">*</span>';
  } else {
    labId.innerHTML = t('lab_id');
  }
}

function setLang(lang) {
  LANG = lang;
  document.documentElement.lang = (lang === 'zh') ? 'zh' : 'en';
  // headers
  document.getElementById('titleMain').textContent = t('title');
  document.getElementById('sq').placeholder = t('ph_search');
  document.getElementById('mCartTitle').textContent = t('cart_title');
  document.getElementById('mCoTitle').textContent = t('co_title');
  document.getElementById('mCartCheckout').textContent = t('to_checkout');
  document.getElementById('btnSend').textContent = t('submit');
  document.getElementById('fid').placeholder = t('ph_id');
  document.getElementById('fnote').placeholder = t('ph_note');
  document.getElementById('femail').placeholder = t('ph_email');
  // labels
  document.getElementById('labMethod').innerHTML = t('lab_method') + ' <span class="req">*</span>';
  document.getElementById('optPickup').textContent = t('opt_pickup');
  document.getElementById('optDelivery').textContent = t('opt_delivery');
  document.getElementById('labName').innerHTML = t('lab_name') + ' <span class="req">*</span>';
  document.getElementById('labPhone').innerHTML = t('lab_phone') + ' <span class="req">*</span>';
  document.getElementById('labContact').innerHTML = t('lab_contact') + ' <span class="req">*</span>';
  document.getElementById('labEmail').innerHTML = t('lab_email') + ' <span class="req">*</span>';
  document.getElementById('labNote').innerHTML = t('lab_note');
  onMethodChange();
  buildTabs();
  renderList();
  updateCartBar();
  renderCartModal();
}

/* ========== Order send ========== */
var _ejsLoaded = false;
function loadEJS(cb) {
  if (_ejsLoaded && window.emailjs) { cb(); return; }
  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js';
  s.onload = function() {
    _ejsLoaded = true;
    try { emailjs.init(EJS_PUB); } catch (e) {}
    cb();
  };
  s.onerror = function() { cb(new Error('ejs load fail')); };
  document.head.appendChild(s);
}

/*
  Order number format: 7 digits   Y MM DD NN
   - Y  = last digit of year (2026 → 6)
   - MM = 01-12
   - DD = 01-31
   - NN = today's sequential order count 01-99 (shared across all customers/devices)
  Uses a free atomic-counter service (abacus.jasoncameron.dev) to produce a
  global count per day-key. Falls back to localStorage count per device, then
  a random 2-digit if everything fails.
*/
function pad2(n) { return (n < 10 ? '0' : '') + n; }
function todayKey() {
  var d = new Date();
  var y = d.getFullYear() % 10;
  var m = d.getMonth() + 1;
  var day = d.getDate();
  return '' + y + pad2(m) + pad2(day);  // 5-digit: YMMDD  e.g. "60420"
}
function genRef(cb) {
  var prefix = todayKey();
  var done = false;
  function finalize(countVal) {
    if (done) return;
    done = true;
    var c = parseInt(countVal, 10);
    if (!c || isNaN(c) || c < 1) {
      try {
        var lk = 'hfa_cnt_' + prefix;
        var lc = parseInt(localStorage.getItem(lk) || '0', 10) + 1;
        localStorage.setItem(lk, String(lc));
        c = lc;
      } catch (e) {
        c = Math.floor(Math.random() * 99) + 1;
      }
    }
    var nn = c % 100;
    if (nn === 0) nn = 1;
    cb(prefix + pad2(nn));
  }
  // Hard timeout so UI never hangs if the counter service is slow/blocked
  setTimeout(function() { finalize(null); }, 3500);
  try {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'https://abacus.jasoncameron.dev/hit/hf-foods-atl/' + prefix, true);
    xhr.onload = function() {
      if (xhr.status >= 200 && xhr.status < 300) {
        try {
          var data = JSON.parse(xhr.responseText);
          finalize(data && (data.value || data.count));
        } catch (e) { finalize(null); }
      } else {
        finalize(null);
      }
    };
    xhr.onerror = function() { finalize(null); };
    xhr.send();
  } catch (e) {
    finalize(null);
  }
}

function buildBody() {
  var lines = [];
  var total = 0;
  var codes = [];
  for (var k in cart) codes.push(k);
  for (var i = 0; i < codes.length; i++) {
    var it = cart[codes[i]];
    var p = it.product;
    // Parse unit: "40lb/cs" -> spec "40lb" + count_unit "cs"; "lbs" -> count_unit "lbs"
    var u = (p.unit || '').trim();
    var spec = '', cu = '';
    var slash = u.indexOf('/');
    if (slash > -1) { spec = u.substring(0, slash).trim(); cu = u.substring(slash + 1).trim(); }
    else { cu = u; }
    var qtyPart = it.qty + (cu ? ' ' + cu : '');
    var line = '[' + p.code + '] [' + qtyPart + ']';
    if (spec) line += ' [' + spec + ']';
    line += ' ' + (p.name_cn || '') + ' / ' + (p.name_en || '');
    lines.push(line);
    total += it.qty;
  }
  return { body: lines.join('\n'), count: codes.length, total: total };
}

function sendOrder() {
  var name = document.getElementById('fname').value.trim();
  var phone = document.getElementById('fphone').value.trim();
  var contact = document.getElementById('fcontact').value.trim();
  var email = document.getElementById('femail').value.trim();
  var fid = document.getElementById('fid').value.trim();
  var radios = document.getElementsByName('fmethod');
  var methodVal = '';
  for (var mi = 0; mi < radios.length; mi++) { if (radios[mi].checked) { methodVal = radios[mi].value; break; } }
  var err = document.getElementById('msgErr');
  var ok = document.getElementById('msgOk');
  err.classList.remove('show'); ok.classList.remove('show');
  if (!methodVal) { err.textContent = t('need_method'); err.classList.add('show'); return; }
  if (!name) { err.textContent = t('need_name'); err.classList.add('show'); return; }
  if (!phone) { err.textContent = t('need_phone'); err.classList.add('show'); return; }
  var phoneDigits = phone.replace(/\D/g, '');
  if (phoneDigits.length !== 10) { err.textContent = t('need_phone_10'); err.classList.add('show'); return; }
  if (!contact) { err.textContent = t('need_contact'); err.classList.add('show'); return; }
  if (!email) { err.textContent = t('need_email'); err.classList.add('show'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { err.textContent = t('need_email_valid'); err.classList.add('show'); return; }
  if (methodVal === 'delivery' && !fid) { err.textContent = t('need_id_delivery'); err.classList.add('show'); return; }
  var methodLabel = (methodVal === 'pickup') ? '自取 / Pickup' : '送货 / Delivery';
  var info = buildBody();
  if (info.count === 0) { err.textContent = t('cart_empty_err'); err.classList.add('show'); return; }

  var btn = document.getElementById('btnSend');
  btn.disabled = true;
  btn.textContent = t('sending');

  genRef(function(orderRef) {
  // Prepend the order number + key fields so they're always visible in Gmail body
  var bodyWithRef = '订单号 / Order #: ' + orderRef + '\n'
                  + '取货方式 / Order Type: ' + methodLabel + '\n'
                  + '客户编号 / Customer ID: ' + (fid || '(无 / N/A)') + '\n'
                  + '餐馆 / Restaurant: ' + name + '\n'
                  + '联系人 / Contact: ' + contact + '\n'
                  + '电话 / Phone: ' + phone + '\n'
                  + '邮箱 / Email: ' + email + '\n'
                  + '====================================\n'
                  + info.body;

  loadEJS(function(e) {
    if (e) {
      err.textContent = t('send_fail');
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = t('submit');
      return;
    }
    var params = {
      to_email: 'HFFoodsATL@gmail.com',
      order_ref: orderRef,
      customer_id: fid,
      customer_name: name,
      customer_email: email,
      route: methodLabel,
      order_type: methodLabel,
      delivery_date: '',
      item_count: info.count,
      total_qty: info.total,
      order_body: bodyWithRef,
      note: document.getElementById('fnote').value,
      phone: phone,
      contact: contact,
      date: new Date().toLocaleString()
    };
    emailjs.send(EJS_SVC, EJS_TPL, params).then(function() {
      // Show success with prominent order number for the customer
      ok.innerHTML = t('send_ok')
        + '<div style="margin-top:8px;padding:8px 10px;background:#fff;border:1px dashed #16a34a;border-radius:5px;font-size:13px;color:#166534;font-weight:700;text-align:center">'
        + '订单号 / Order #<br><span style="font-size:16px;letter-spacing:.5px">' + escHtml(orderRef) + '</span>'
        + '</div>';
      ok.classList.add('show');
      err.classList.remove('show');
      cart = {};
      updateCartBar();
      renderList();
      renderCartModal();
      setTimeout(function() { closeModal('mCo'); }, 6000);
      btn.disabled = false;
      btn.textContent = t('submit');
    }, function() {
      err.textContent = t('send_fail');
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = t('submit');
    });
  });
  });
}

/* ========== Utils ========== */
function escHtml(s) {
  if (s === undefined || s === null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function escAttr(s) {
  if (s === undefined || s === null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

/* ========== Init ========== */
document.getElementById('sq').addEventListener('input', function(e) {
  SQ = e.target.value;
  renderList();
});
// Language is fixed per file (zh in index.html, en in en.html).
// setLang() already triggers buildTabs / renderList / updateCartBar internally.
setLang(LANG);
</script>
